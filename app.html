<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>eTOm 오디오 증폭기 열기</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
</head>
<body>
    <div class="app-page-wrapper">
        <div class="app-functions">
            <!-- 버전 표시: 좌측 상단 -->
            <div style="position: absolute; top: 15px; left: 15px; font-size: 0.85rem; color: #666; font-weight: bold; letter-spacing: 0.5px;">v3.1</div>

            <!-- 설명서 아이콘: 우측 상단으로 이동 -->
            <div class="top-link-container" style="top: 10px; right: 10px;">
                <a href="https://99pax.blogspot.com/p/etom.html" target="_blank" id="appManualBtn" class="manual-link-icon" title="사용 설명서 보기" style="width: 30px; height: 30px; font-size: 1.2rem;">📄</a>
            </div>
            
            <div style="text-align: center; color: #FFD700; font-size: 0.9rem; font-weight: bold; margin-bottom: 5px;">⚠️ 화면이 켜져 있어야 작동합니다</div>
            <h3 style="text-align: center; color: #aaa; margin-top: 0; margin-bottom: 15px;">오디오 증폭 컨트롤</h3>
            <div class="slider-container">
                <label for="volumeSlider" style="text-align: center;">소리 크기 미세 조절</label>
                <input type="range" id="volumeSlider" min="0" max="10" step="0.1" value="1">
                <div style="display: flex; justify-content: space-between; margin-top: 5px; font-weight: bold;">
                    <span style="font-size: 1rem;">작게</span>
                    <span style="font-size: 1rem;">크게</span>
                </div>
            </div>

            <!-- Preset Buttons -->
            <div class="preset-grid">
                <button class="preset-btn active" id="btnMode1">
                    <div class="preset-title">1. 기본 증폭</div>
                    <div class="preset-desc">원래 소리 깨끗하게</div>
                </button>
                <button class="preset-btn" id="btnMode2">
                    <div class="preset-title">2. 강력 증폭</div>
                    <div class="preset-desc">작은 소리도 크게</div>
                </button>
                <button class="preset-btn" id="btnMode3">
                    <div class="preset-title">3. 대화 집중</div>
                    <div class="preset-desc">사람 목소리 또렷하게</div>
                </button>
                <button class="preset-btn" id="btnMode4">
                    <div class="preset-title">4. 소음 억제</div>
                    <div class="preset-desc">웅~ 하는 기계음 감소</div>
                </button>
                <button class="preset-btn" id="btnMode5">
                    <div class="preset-title">5. 귀 보호</div>
                    <div class="preset-desc">날카로운 고음 부드럽게</div>
                </button>
            </div>

            <div id="statusIndicator" class="status-indicator stopped">
                <span id="statusText" style="display: block; text-align: center;">대기 중</span>
            </div>
            
            <div class="controls">
                <button id="btnStart" class="btn btn-primary">시작하기</button>
                <button id="btnStop" class="btn btn-danger" disabled>종료하기</button>
            </div>
            
            <div id="errorMessage" class="error-message"></div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                .then(registration => console.log('SW registered'))
                .catch(err => console.error('SW registration failed:', err));
            });
        }

    </script>
</body>
</html>
