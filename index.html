<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>eTOm - ears to mouth</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
</head>
<body>
    <header class="header-outer">
        <div class="landing-header">
            <img src="etom_LOGO_Rou.png" alt="eTOm Logo" class="landing-logo">
            <h1 class="landing-title">ears to mouth</h1>
        </div>
    </header>

    <div class="landing-wrapper">

        <!-- 중앙 메인 카드: 앱 설치 및 설명서 -->
        <main class="main-card card-base">
            <div class="card-header">
                오디오증폭기 eTOm
            </div>
            <div class="card-body">
                <!-- 앱 설치 버튼 -->
                <button id="installSection" class="action-btn">
                    <span>앱 설치하기</span>
                    <span id="installFallback" class="btn-sub-text">-클릭하시면설치가진행됩니다-</span>
                </button>
                
                <!-- 사용설명서 버튼 -->
                <a href="#" class="action-btn" id="manualBtn">
                    <span>사용설명서</span>
                    <span class="btn-sub-text">기기별사용안내 / manual</span>
                </a>
            </div>
        </main>

        <!-- 하단 정보 배너: 수동 재구축 단계 (위 카드와 속성 동일화) -->
        <section class="info-banner card-base">
            <div class="banner-badge">무선 이어폰을 사용하세요</div>
            <div class="banner-content">
                <img src="bott.png" alt="Instruction" style="position: absolute; top: 45%; left: 50%; transform: translate(-50%, -45%) scale(1.44); max-width: 100%; max-height: 100%; object-fit: contain; z-index: 1;">
                <div class="banner-footer" style="position: relative; z-index: 10; margin-top: auto; width: 100%; top: 15px;">
                    기기에 따라 기능이 달라질 수 있습니다
                </div>
            </div>
            <!-- 이스터에그: 우측 하단 숨겨진 영역 -->
            <div id="easterEgg" style="position: absolute; bottom: 0; right: 0; width: 44px; height: 44px; z-index: 20; cursor: default;"></div>
        </section>
    </div>

    <!-- iOS 설치 안내 팝업 (기존 로직 유지) -->
    <div id="iosInstallPopup" class="ios-popup" style="display: none;">
        <div class="ios-popup-content">
            <span class="close-popup" id="closeIosPopup">&times;</span>
            <h3 style="color: #FFD700; margin-top: 0; font-size: 1.6rem;">🍎 아이폰 설치 안내</h3>
            <p style="font-size: 1.1rem; line-height: 1.6;">
                화면 하단의 <strong style="font-size:1.4rem;">[공유 ⍗]</strong> 아이콘을 누르신 후,<br>
                메뉴에서 <strong style="color: #FFD700; font-size:1.4rem;">[홈 화면에 추가 ⊕]</strong>를<br>선택해 주세요!
            </p>
        </div>
    </div>

    <!-- 사용설명서 이미지 팝업 -->
    <div id="manualPopup" class="ios-popup" style="display: none;">
        <div class="ios-popup-content" style="padding: 15px; max-width: 90%; background-color: #1a1a1a;">
            <span class="close-popup" id="closeManualPopup" style="top: 5px; right: 15px; z-index: 10;">&times;</span>
            <!-- 나중에 완성된 이미지 파일명으로 아래 src 속성을 변경해 주세요 (예: manual_final.png) -->
            <img src="manual_image.png" alt="사용설명서" id="manualImage" style="width: 100%; height: auto; border-radius: 10px; display: block; max-height: 75vh; object-fit: contain;">
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        // Service Worker Registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                .then(registration => console.log('SW registered'))
                .catch(err => console.error('SW registration failed:', err));
            });
        }
        
        // 사용설명서 버튼 클릭 시 팝업 열기
        document.getElementById('manualBtn').addEventListener('click', (e) => {
            e.preventDefault();
            document.getElementById('manualPopup').style.display = 'flex';
        });

        // 사용설명서 팝업 닫기
        document.getElementById('closeManualPopup').addEventListener('click', () => {
            document.getElementById('manualPopup').style.display = 'none';
        });

        // 팝업 바깥 어두운 배경 클릭 시 닫기
        document.getElementById('manualPopup').addEventListener('click', (e) => {
            if (e.target === document.getElementById('manualPopup')) {
                document.getElementById('manualPopup').style.display = 'none';
            }
        });

        // 이스터에그: 3번 클릭 시 app.html 이동
        (function() {
            let eggCount = 0;
            let eggTimer = null;
            document.getElementById('easterEgg').addEventListener('click', () => {
                eggCount++;
                clearTimeout(eggTimer);
                if (eggCount >= 3) {
                    eggCount = 0;
                    window.location.href = 'app.html';
                } else {
                    eggTimer = setTimeout(() => { eggCount = 0; }, 2000);
                }
            });
        })();
    </script>
</body>
</html>
