<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>eTOm 연결</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
</head>
<body>
    <div class="main-wrapper">
        <!-- 상단: 홈페이지 이름 -->
        <header class="header">
            <h1 class="company-title">KIXKOREA</h1>
            <div class="app-subtitle-badge">eTOm (오디오 증폭 프로그램)</div>
        </header>

        <!-- 중앙: 2단 배치 (좌: 설치 / 우: 설명서) -->
        <div class="split-layout">
            <!-- 좌측: 설치 영역 (전체 클릭 가능) -->
            <div class="split-left" id="installSection">
                <div class="install-content">
                    <h2 class="button-title" style="color: #FF8C00;">
                        <img src="icon.png" alt="앱 로고" class="button-logo"> 앱 설치하기
                    </h2>
                    <p class="button-desc">클릭하시면 설치가 진행됩니다.<br>앱 실행 후 마이크 사용을 허용해 주세요.</p>
                    <p id="installFallback" class="button-fallback">(설치 준비 중이거나 이미 설치되었습니다)</p>
                </div>
            </div>

            <!-- 우측: 설명서 영역 -->
            <div class="split-right">
                <div class="install-content">
                    <h2 class="button-title" style="color: #4CAF50;">
                        <img src="icon.png" alt="설명서 로고" class="button-logo"> 사용 설명서
                    </h2>
                    <p class="button-desc">기기별 사용 방법 안내 그림</p>
                </div>
            </div>
        </div>

        <!-- iOS 설치 안내 팝업 (기본 숨김) -->
        <div id="iosInstallPopup" class="ios-popup" style="display: none;">
            <div class="ios-popup-content">
                <span class="close-popup" id="closeIosPopup">&times;</span>
                <h3 style="color: #FF8C00; margin-top: 0; font-size: 1.6rem;">🍎 아이폰 설치 안내</h3>
                <p style="font-size: 1.1rem; line-height: 1.6;">
                    화면 하단의 <strong style="font-size:1.4rem;">[공유 ⍗]</strong> 아이콘을 누르신 후,<br>
                    메뉴에서 <strong style="color: #FFD700; font-size:1.4rem;">[홈 화면에 추가 ⊕]</strong>를<br>선택해 주세요!
                </p>
                <p style="font-size: 0.9rem; color: #888; margin-top: 20px;">(애플 정책상 자동 설치 버튼을 지원하지 않습니다)</p>
            </div>
        </div>

        <!-- 하단: 이후 추가될 버튼 및 컨트롤 라인 -->
        <div class="future-buttons" style="text-align: center; margin-bottom: 30px;">
            <a href="app.html" class="btn btn-primary" style="text-decoration: none; font-size: 1.5rem; padding: 15px 30px; border-radius: 10px; display: inline-block; background-color: #333; color: #fff;">👉 웹에서 바로 앱 실행하기</a>
            <p style="color: #666; font-size: 0.9rem; margin-top: 15px;">(추후 이 자리에 다양한 버튼이 메뉴처럼 배치될 예정입니다)</p>
        </div>
    </div>
    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                .then(registration => console.log('SW registered'))
                .catch(err => console.error('SW registration failed:', err));
            });
        }
    </script>
</body>
</html>
