<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>eTOm 연결</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
</head>
<body>
    <div class="main-wrapper">
        <!-- 상단: 홈페이지 이름 -->
        <header class="header">
            <h1 class="main-title">eTOm</h1>
        </header>

        <!-- 중앙: 2단 배치 (좌: 설치 / 우: 설명서) -->
        <div class="split-layout">
            <!-- 좌측: 설치 영역 (전체 클릭 가능) -->
            <div class="split-left" id="installSection">
                <div class="install-content">
                    <h2 style="color: #FF8C00; font-size: 2.2rem; margin-top: 0;">⬇️ 앱 설치</h2>
                    <p style="font-size: 1.3rem; margin-bottom: 20px;">여기를 클릭하여 기기에<br>설치하세요.</p>
                    <p id="installFallback" style="font-size: 0.95rem; color: #888;">(설치 준비 중이거나 이미 설치되었습니다)</p>
                </div>
            </div>

            <!-- 우측: 설명서 영역 -->
            <div class="split-right">
                <div class="manual-placeholder">
                    <span style="font-size: 1.8rem; margin-bottom: 10px;">📖 사용 설명서</span>
                    <p>(추후 이미지 파일로<br>교체될 영역입니다)</p>
                </div>
            </div>
        </div>

        <!-- 하단: 이후 추가될 버튼 및 컨트롤 라인 -->
        <div class="app-functions">
            <h3 style="text-align: center; color: #aaa; margin-bottom: 20px;">오디오 증폭 컨트롤</h3>
            <div id="statusIndicator" class="status-indicator stopped">
                <span id="statusText">대기 중</span>
            </div>
            
            <div class="controls">
                <button id="btnStart" class="btn btn-primary">연결 시작</button>
                <button id="btnStop" class="btn btn-danger" disabled>연결 종료</button>
            </div>

            <div class="slider-container">
                <label for="volumeSlider">소리 크기 조절</label>
                <input type="range" id="volumeSlider" min="0" max="10" step="0.1" value="1">
                <div style="display: flex; justify-content: space-between; margin-top: 10px; font-weight: bold;">
                    <span style="font-size: 1.2rem;">작게</span>
                    <span style="font-size: 1.2rem;">크게</span>
                </div>
            </div>
            
            <div id="errorMessage" class="error-message"></div>
        </div>
    </div>
    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                .then(registration => console.log('SW registered'))
                .catch(err => console.error('SW registration failed:', err));
            });
        }
    </script>
</body>
</html>
